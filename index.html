<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اميل بطرس حنين | الهرم الرابع</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #58a6ff;
            object-fit: cover;
            margin-bottom: 20px;
        }
        h1 {
            color: #f0f6fc;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .nickname {
            color: #58a6ff;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .bio {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #8b949e;
        }
        .info-item {
            background-color: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info-item span {
            color: #f0f6fc;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="profile.jpg" alt="اميل بطرس" class="profile-img">
    
    <h1>اميل بطرس حنين</h1>
    <div class="nickname">الشهرة: الحكيم / شيشتاوي (الهرم الرابع)</div>
    
    <div class="bio">
        باحث أمن سيبراني ومبتكر حلول تكنولوجية | متخصص نظم معلومات إدارية (MIS)
    </div>
    
    <div class="info-item">
        <strong>الموقع:</strong>
        <span>بني محمد سلطان، مركز المنيا، مصر 📍</span>
    </div>
    
    <div class="info-item">
        <strong>البريد الإلكتروني:</strong>
        <span>emailbotros010@gmail.com ✉️</span>
    </div>
</div>

</body>
</html>
